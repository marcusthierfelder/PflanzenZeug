name: pflanzen_zeug
description: "Pflanzen erkennen, Krankheiten diagnostizieren, Pflegetipps erhalten"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Kamera & Bilder
  image_picker: ^1.0.7

  # HTTP für Claude API
  http: ^1.1.2

  # Lokale Speicherung (API Key)
  shared_preferences: ^2.2.2

  # Keychain-Speicherung (überlebt Reinstallation)
  flutter_secure_storage: ^9.2.4

  # State Management
  flutter_riverpod: ^2.6.1
  mobile_scanner: ^7.2.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  path_provider: ^2.1.5
  uuid: ^4.5.3
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
